server:
  port: 8083

spring:
  application:
    name: event-consumer-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/event_db
    username: ${DB_USERNAME:platform_user}
    password: ${DB_PASSWORD:platform_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:29092}
    consumer:
      group-id: event-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.platform.event_consumer_service.dto"
        spring.json.value.default.type: "com.platform.event_consumer_service.dto.KafkaEvent"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: redis123

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ════════════════════════════════════════
  # JOB 1: Build user-service
  # ════════════════════════════════════════
  build-user-service:
    name: Build user-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build user-service
        working-directory: ./user-service
        run: mvn clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: user-service/target/*.jar

  # ════════════════════════════════════════
  # JOB 2: Build event-producer-service
  # ════════════════════════════════════════
  build-event-producer:
    name: Build event-producer-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build event-producer-service
        working-directory: ./event-producer-service
        run: mvn clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: event-producer-jar
          path: event-producer-service/target/*.jar

  # ════════════════════════════════════════
  # JOB 3: Build event-consumer-service
  # ════════════════════════════════════════
  build-event-consumer:
    name: Build event-consumer-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build event-consumer-service
        working-directory: ./event-consumer-service
        run: mvn clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: event-consumer-jar
          path: event-consumer-service/target/*.jar

  # ════════════════════════════════════════
  # JOB 4: Build notification-service
  # ════════════════════════════════════════
  build-notification:
    name: Build notification-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build notification-service
        working-directory: ./notification-service
        run: mvn clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-jar
          path: notification-service/target/*.jar

  # ════════════════════════════════════════
  # JOB 5: Build api-gateway-service
  # ════════════════════════════════════════
  build-api-gateway:
    name: Build api-gateway-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build api-gateway-service
        working-directory: ./api-gateway-service
        run: mvn clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-jar
          path: api-gateway-service/target/*.jar

  # ════════════════════════════════════════
  # JOB 6: Build and Push Docker Images
  # Runs only after ALL services build ✅
  # Runs only on push to main (not PRs)
  # ════════════════════════════════════════
  push-docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - build-user-service
      - build-event-producer
      - build-event-consumer
      - build-notification
      - build-api-gateway
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # ↑ Only push images on merge to main
    #   NOT on pull requests (saves DockerHub quota)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # ↑ Uses secrets you added in GitHub Settings

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }}
          # ↑ Two tags:
          #   :latest = always points to newest
          #   :abc1234 = specific commit (for rollback)

      - name: Build & Push event-producer-service
        uses: docker/build-push-action@v5
        with:
          context: ./event-producer-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/event-producer-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/event-producer-service:${{ github.sha }}

      - name: Build & Push event-consumer-service
        uses: docker/build-push-action@v5
        with:
          context: ./event-consumer-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/event-consumer-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/event-consumer-service:${{ github.sha }}

      - name: Build & Push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ github.sha }}

      - name: Build & Push api-gateway-service
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway-service:${{ github.sha }}

      - name: Summary
        run: |
          echo "🐳 Docker images pushed to DockerHub!"
          echo "📦 ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest"
          echo "📦 ${{ secrets.DOCKERHUB_USERNAME }}/event-producer-service:latest"
          echo "📦 ${{ secrets.DOCKERHUB_USERNAME }}/event-consumer-service:latest"
          echo "📦 ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest"
          echo "📦 ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway-service:latest"


## How the two tags work:

# :latest
#   sagarpokale/user-service:latest
#   → always = most recent build
#   → docker pull sagarpokale/user-service:latest

# :commit-sha
#   sagarpokale/user-service:a3f8c2d
#   → pinned to exact commit
#   → if latest breaks → rollback to previous sha ✅
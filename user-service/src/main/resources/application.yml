server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/user_db
    #                  ↑ if DB_HOST env var exists → use it
    #                    else → fall back to localhost:3307
    #                  When running in Docker: DB_HOST=mysql, DB_PORT=3306
    #                  When running locally:   DB_HOST=localhost, DB_PORT=3307
    username: ${DB_USERNAME:platform_user}
    password: ${DB_PASSWORD:platform_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000
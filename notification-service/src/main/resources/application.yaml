server:
  port: 8084

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:29092}
    consumer:
      group-id: notification-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.platform.notification_service.dto"
        spring.json.value.default.type: "com.platform.notification_service.dto.KafkaEvent"

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: rabbit_user
    password: rabbit_pass

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

rabbitmq:
  exchange: notification.exchange
  queue:
    email: notification.email.queue
    push: notification.push.queue
  routing-key:
    email: notification.email
    push: notification.push